<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leonardo Board</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="toolbar">
    <button id="btn-new-note" class="toolbar-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
      Neue Note
    </button>
    <div class="toolbar-separator"></div>
    <button id="btn-zoom-out" class="toolbar-btn icon-only" title="Zoom Out (-)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span id="zoom-level">100%</span>
    <button id="btn-zoom-in" class="toolbar-btn icon-only" title="Zoom In (+)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <div class="toolbar-separator"></div>
    <button id="btn-toggle-grid" class="toolbar-btn icon-only" title="Grid ein/aus">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
    </button>
    <div class="toolbar-separator"></div>
    <div class="sync-status">
      <div id="sync-indicator" class="sync-dot"></div>
      <span id="sync-text">Bereit</span>
    </div>
  </div>
  
  <div id="canvas-container">
    <div id="paper-canvas">
      <svg style="position:absolute;width:0;height:0;pointer-events:none;">
        <defs>
          <filter id="grid-distortion">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
      </svg>
      
      <svg id="grid-svg" class="overlay-svg layer-grid" xmlns="http://www.w3.org/2000/svg"></svg>
      <svg class="overlay-svg layer2 ink-splatters" xmlns="http://www.w3.org/2000/svg"></svg>
      <svg class="overlay-svg layer3 ink-scratches" xmlns="http://www.w3.org/2000/svg"></svg>
      
      <svg id="connections-svg" class="overlay-svg layer-connections" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="rgba(101,67,33,0.5)"/>
          </marker>
        </defs>
        <g id="connection-lines"></g>
      </svg>
      
      <div id="notes-container"></div>
    </div>
  </div>
  
  <div id="context-menu" class="context-menu hidden">
    <button data-action="edit">✎ Bearbeiten</button>
    <button data-action="duplicate">⊕ Duplizieren</button>
    <button data-action="flip">↩ Umdrehen</button>
    <button data-action="connect">⊟ Verbinden</button>
    <button data-action="pin">📌 Anheften</button>
    <div class="menu-separator"></div>
    <div class="color-picker-label">🎨 Farbe</div>
    <div class="color-picker-row">
      <button class="color-swatch" data-action="color" data-color="#f9e9c8" style="background:#f9e9c8"></button>
      <button class="color-swatch" data-action="color" data-color="#f9e060" style="background:#f9e060"></button>
      <button class="color-swatch" data-action="color" data-color="#aed6f1" style="background:#aed6f1"></button>
      <button class="color-swatch" data-action="color" data-color="#a9dfbf" style="background:#a9dfbf"></button>
      <button class="color-swatch" data-action="color" data-color="#f1948a" style="background:#f1948a"></button>
      <button class="color-swatch" data-action="color" data-color="#c39bd3" style="background:#c39bd3"></button>
    </div>
    <div class="menu-separator"></div>
    <button data-action="delete" class="danger">✕ Löschen</button>
  </div>
  
  <div id="toast-container"></div>
  
  <script type="module" src="api.js"></script>
  <script type="module" src="connections.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
