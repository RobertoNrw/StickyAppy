<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leonardo Board</title>
  <link rel="stylesheet" href="style.css">
  <!-- Bug 6 Fix: SF Pro Display ist kein Google Font – nur Caveat laden -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-texture"></div>
  
  <div class="toolbar">
    <button id="btn-new-note" class="toolbar-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
      Neue Note
    </button>
    <div class="toolbar-separator"></div>
    <button id="btn-zoom-out" class="toolbar-btn icon-only">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"/></svg>
    </button>
    <span id="zoom-level">100%</span>
    <button id="btn-zoom-in" class="toolbar-btn icon-only">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m-3-3h6"/></svg>
    </button>
    <div class="toolbar-separator"></div>
    <div class="sync-status">
      <div id="sync-indicator" class="sync-dot"></div>
      <span id="sync-text">Prüfe...</span>
    </div>
  </div>

  <div id="canvas-container">
    <div id="paper-canvas">
      <svg class="overlay-svg layer1" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <rect x="2%" y="2%" width="96%" height="96%" fill="none" stroke="rgba(90,60,30,0.12)" stroke-width="1.5" rx="4" />
      </svg>
      <svg class="overlay-svg layer2 ink-splatters" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"></svg>
      <svg class="overlay-svg layer3 ink-scratches" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"></svg>
      
      <div class="book-spine"></div>
      <div id="grid-overlay"></div>
      
      <svg id="connections-svg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="rgba(101,67,33,0.5)" />
          </marker>
        </defs>
      </svg>

      <div id="notes-container"></div>
    </div>
  </div>

  <div id="context-menu" class="context-menu hidden">
    <button data-action="edit">✎ Bearbeiten</button>
    <button data-action="duplicate">⊕ Duplizieren</button>
    <button data-action="flip">↩ Umdrehen</button>
    <button data-action="connect">⊟ Verbinden mit...</button>
    <button data-action="pin">📌 Anheften / Lösen</button>
    <div class="menu-separator"></div>
    <button data-action="delete" class="danger">✕ Löschen</button>
  </div>
  
  <div id="toast-container"></div>

  <script type="module" src="api.js"></script>
  <script type="module" src="connections.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
